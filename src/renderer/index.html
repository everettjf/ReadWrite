<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: file:; font-src 'self' data:; connect-src 'self' https: wss: ws: data: blob: file:; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadWrite</title>
    <script>
      // Apply the resolved dark/light class before any React code runs so the
      // first paint is the right colour. Reads a cached value the settings
      // store wrote on the previous run, falling back to the OS preference.
      (function () {
        try {
          var stored = localStorage.getItem('rw-theme-resolved');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
