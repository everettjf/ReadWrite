appId: app.readwrite.desktop
productName: ReadWrite
copyright: Copyright © 2026 everettjf
directories:
  buildResources: build
  output: release/${version}
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.tsbuildinfo}'
  - '!{commitlint.config.cjs,vitest.config.ts,tailwind.config.ts,postcss.config.cjs,.editorconfig}'
  - '!{dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{.github,.husky,docs}'
  - '!**/node_modules/.cache/**'
asarUnpack:
  - 'resources/**'
  - '**/*.{node,dll}'
win:
  executableName: ReadWrite
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  icon: build
  maintainer: everettjf
  category: Office
  artifactName: ${productName}-${version}-${arch}.${ext}
appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
npmRebuild: false
# Auto-update channel. With provider: github, electron-builder writes
# `latest-mac.yml`, `latest.yml`, and `latest-linux.yml` next to the
# installers; electron-updater (in the running app) reads them off the
# matching GitHub Release at runtime.
#
# Note: macOS auto-update only completes when the app is signed and
# notarized. Until we wire up a Developer ID, mac users will be able to
# *check* and *download* updates but quitAndInstall() will fail. Windows
# / Linux work without signing.
publish:
  provider: github
  owner: everettjf
  repo: ReadWrite
